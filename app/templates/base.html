<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">

    <title>ССК Альянс</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark alliance-navbar">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="/">
            <img
                src="{{ url_for('static', filename='img/logos/alliance-big-mono.png') }}"
                class="navbar-logo me-2"
                alt="ССК Альянс"
            >
            ССК Альянс
        </a>

        <div class="ms-auto">

            <a
                href="/admin"
                class="btn btn-outline-light me-2"
            >
                Admin
            </a>

            <a
                href="/logout"
                class="btn btn-light"
            >
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<script
    src="{{ url_for(
        'static',
        filename='js/main.js'
    ) }}"
></script>

</body>
</html>
