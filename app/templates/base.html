<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ССК Альянс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Ambient background grid -->
<div class="bg-grid" aria-hidden="true"></div>

<nav class="alliance-navbar">
    <div class="nav-inner">
        <a class="nav-brand" href="/">
            <img
                src="{{ url_for('static', filename='img/logos/alliance-big-mono.png') }}"
                class="brand-logo"
                alt="Альянс РТУ МИРЭА"
            >
            <div class="brand-text">
                <span class="brand-title">АЛЬЯНС РТУ МИРЭА</span>
                <span class="brand-sub">СТУДЕНЧЕСКИЙ СПОРТИВНЫЙ КЛУБ</span>
            </div>
        </a>

        <div class="nav-actions">
            <a href="/admin" class="nav-btn nav-btn--outline">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                Admin
            </a>
            <a href="/logout" class="nav-btn nav-btn--solid">
                Выход
            </a>
        </div>
    </div>
</nav>

<main class="page-content">
    {% block content %}
    {% endblock %}
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <span class="footer-brand">ССК АЛЬЯНС</span>
        <span class="footer-year">© 2026</span>
    </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
