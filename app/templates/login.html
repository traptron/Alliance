<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card">

                <div class="card-body">

                    <h3 class="mb-4">
                        Login
                    </h3>

                    <form method="POST">

                        <div class="mb-3">

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Username"
                            >

                        </div>

                        <div class="mb-3">

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Password"
                            >

                        </div>

                        <button class="btn btn-dark w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
