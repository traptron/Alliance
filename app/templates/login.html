<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ССК Альянс</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="bg-grid" aria-hidden="true"></div>

<div class="login-page">
    <div class="login-card">
        <div class="login-logo">A</div>
        <div class="login-title">ССК АЛЬЯНС</div>
        <div class="login-sub">Введите данные для входа</div>

        <form method="POST">
            <div class="input-group-dark">
                <label for="username">ЛОГИН</label>
                <input type="text" id="username" name="username" class="input-dark" placeholder="admin" autocomplete="username">
            </div>
            <div class="input-group-dark">
                <label for="password">ПАРОЛЬ</label>
                <input type="password" id="password" name="password" class="input-dark" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">ВОЙТИ</button>
        </form>
    </div>
</div>
</body>
</html>
